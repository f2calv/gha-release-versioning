name: gha-release-versioning
author: Alex Vincent
description: Determines a semantic version for the current commit, optionally tags the repo with this version and creates a release.

inputs:
  GITHUB_TOKEN:
    description: e.g. {{ secrets.GITHUB_TOKEN }}
    required: true
  semVer:
    description: Pass in an externally generated semantic version, if empty then uses GitVersion.
    required: false
    type: string
    default: ''
  tag-prefix:
    description: Prefix the semver, e.g. 1.0.1 or v1.0.1
    required: false
    type: string
    default: v
  move-major-tag:
    description: Create and/or move major version tag, e.g. when creating v1.0.2 then move v1 tag up from the v1.0.1 commit.
    required: false
    type: boolean
    default: true
  tag-and-release:
    description: Sets a Git tag and creates a corresponding release.
    required: false
    type: boolean
    default: true
  gv-config:
    description: Configuration filename that GitVersion will use.
    type: string
    default: GitVersion.yml
  gv-source:
    description: Choose an installation source for GitVersion, options include container, dotnet & actions.
    type: string
    default: actions
  gv-spec:
    description: Choose a version specification for GitVersion.
    type: string
    default: 5.x

outputs:
  version:
    description: e.g. 1.2.301
    value: ${{ steps.set_output.outputs.semVer }}
  semVer:
    description: Deprecated - use 'version' instead. e.g. 1.2.301
    value: ${{ steps.set_output.outputs.semVer }}
  fullSemVer:
    description: e.g. 1.2.301-feature-my-feature.12
    value: ${{ steps.set_output.outputs.fullSemVer }}
  major:
    description: e.g. 1
    value: ${{ steps.set_output.outputs.major }}
  minor:
    description: e.g. 2
    value: ${{ steps.set_output.outputs.minor }}
  patch:
    description: e.g. 301
    value: ${{ steps.set_output.outputs.patch }}
  release-exists:
    description: Does a GitHub Release exist with this version?
    value: ${{ steps.set_output.outputs.release-exists }}

runs:
  using: composite
  steps:

    # Inspect the GitVersion config file to auto-detect the correct GitVersion
    # major version (5.x vs 6.x) and write GV_SPEC to $GITHUB_ENV.
    - name: gitversion config check
      shell: bash
      if: inputs.semVer == ''
      env:
        GV_SPEC: ${{ inputs.gv-spec }}
        GV_CONFIG: ${{ inputs.gv-config }}
      run: bash "${{ github.action_path }}/scripts/gitversion-config-check.sh"

    # Install the requested GitVersion version via the gittools GitHub Action.
    - name: gitversion actions (1 of 2)
      uses: gittools/actions/gitversion/setup@v4
      if: inputs.semVer == '' && inputs.gv-source == 'actions'
      with:
        versionSpec: ${{ env.GV_SPEC }}

    # Execute GitVersion and expose its outputs as step outputs (id: gitversion_actions).
    - name: gitversion actions (2 of 2)
      uses: gittools/actions/gitversion/execute@v4
      if: inputs.semVer == '' && inputs.gv-source == 'actions'
      id: gitversion_actions
      with:
        configFilePath: ${{ inputs.gv-config }}

    # Install the .NET SDK so we can run the GitVersion global tool.
    - name: gitversion dotnet (1 of 2)
      uses: actions/setup-dotnet@v5
      if: inputs.semVer == '' && inputs.gv-source == 'dotnet'
      with:
        dotnet-version: 10.0.x

    # Install the latest GitVersion .NET tool and run it; writes GitVersion.json.
    - name: gitversion dotnet (2 of 2)
      shell: bash
      if: inputs.semVer == '' && inputs.gv-source == 'dotnet'
      run: bash "${{ github.action_path }}/scripts/gitversion-dotnet.sh"

    # Run GitVersion inside the official Docker container; writes GitVersion.json.
    - name: gitversion container (1 of 1)
      shell: bash
      if: inputs.semVer == '' && inputs.gv-source == 'container'
      run: bash "${{ github.action_path }}/scripts/gitversion-container.sh"

    # Select the final SemVer values from whichever source ran above (or parse
    # the manually supplied semVer input) and export them to $GITHUB_ENV.
    - name: semver select
      shell: bash
      env:
        SEMVER_INPUT: ${{ inputs.semVer }}
        GV_SOURCE: ${{ inputs.gv-source }}
        GV_ACTIONS_SEMVER: ${{ steps.gitversion_actions.outputs.semVer }}
        GV_ACTIONS_FULLSEMVER: ${{ steps.gitversion_actions.outputs.fullSemVer }}
        GV_ACTIONS_MAJOR: ${{ steps.gitversion_actions.outputs.major }}
        GV_ACTIONS_MINOR: ${{ steps.gitversion_actions.outputs.minor }}
        GV_ACTIONS_PATCH: ${{ steps.gitversion_actions.outputs.patch }}
      run: bash "${{ github.action_path }}/scripts/semver-select.sh"

    # Check whether a GitHub Release already exists for this version.
    - uses: f2calv/gha-check-release-exists@v2
      id: check-release-exists
      with:
        GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}
        ReleaseName: ${{ env.SEMVER }}

    # Publish all version components as step outputs.
    - name: semver output
      shell: bash
      id: set_output
      env:
        RELEASE_EXISTS: ${{ steps.check-release-exists.outputs.ReleaseExists }}
      run: bash "${{ github.action_path }}/scripts/semver-output.sh"

    # Create a GitHub Release for the computed version.
    - name: create release
      uses: softprops/action-gh-release@v2
      if: |
        steps.check-release-exists.outputs.ReleaseExists == 'false'
          && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
          && inputs.tag-and-release == 'true'
      with:
        tag_name: ${{ inputs.tag-prefix }}${{ env.FULLSEMVER }}
        name: ${{ env.FULLSEMVER }}

    # Create or move the rolling major and major.minor version tags to this commit.
    - name: git apply/move major tag
      shell: bash
      if: |
        steps.check-release-exists.outputs.ReleaseExists == 'false'
          && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
          && inputs.move-major-tag == 'true'
          && inputs.tag-and-release == 'true'
      env:
        TAG_PREFIX: ${{ inputs.tag-prefix }}
      run: bash "${{ github.action_path }}/scripts/git-tag.sh"
